name: CI

on:
  push:
    branches-ignore: [main, beta]
  pull_request:
    branches: [main, beta]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    # Safety net for hung runs (a headless UI test has previously stuck the macos-latest job for
    # ~2h instead of the usual ~1-3 min) — TUnit's own per-test DefaultTestTimeout (see
    # GlobalTestSetup.cs in Kiln.Studio.Tests/Kiln.Studio.UiTests) should already fail a hanging
    # test fast, but this bounds the whole job in case that doesn't fire (e.g. a hang outside test
    # execution, like restore/build, or the whole Avalonia dispatch loop wedging before any test
    # timeout can even be evaluated).
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

      # Uploaded unconditionally (even on a red run) so Phase B (ADR-043) can pull down the
      # windows-latest/ubuntu-latest baselines generated on the very first run for manual review.
      - name: Upload snapshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshots-${{ matrix.os }}
          path: tests/Kiln.Studio.UiTests/Snapshots/
          if-no-files-found: ignore

  inspectcode:
    name: InspectCode (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore --locked-mode

      - name: InspectCode
        run: |
          dotnet tool install -g JetBrains.ReSharper.GlobalTools
          jb inspectcode KilnStudio.slnx -e=WARNING -f=Text -o=inspect.txt
          cat inspect.txt

